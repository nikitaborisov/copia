<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Copia — an abundance of words</title>
<style>
  :root{
    --bg:#1c090c; --panel:#2b1014; --panel2:#3a151b; --tile:#4c1a22; --tile-edge:#702634;
    --tile-sel:#c22b3d; --tile-path:#8f1f2e; --text:#f6e8e6; --dim:#c49a97;
    --accent:#ff7a85; --good:#8fce8f; --bonus:#e8b84b; --bad:#ffb26b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif; height:100%;}
  #app{max-width:980px; margin:0 auto; padding:12px 16px 40px;}
  header{display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:6px 0 14px;
    border-bottom:1px solid var(--panel2); margin-bottom:16px;}
  h1{font-size:22px; margin:0; letter-spacing:1px;}
  h1 .inf{color:var(--accent);}
  .spacer{flex:1;}
  select,button,input[type=text]{background:var(--panel2); color:var(--text); border:1px solid var(--tile-edge);
    border-radius:8px; padding:8px 14px; font-size:14px; cursor:pointer; font-family:inherit;}
  input[type=text]{cursor:text;}
  input[type=text]::placeholder{color:var(--dim); opacity:.7;}
  button:hover,select:hover,input[type=text]:focus{border-color:var(--accent);}
  #boardName{flex:1; min-width:0;}
  #loadRow{display:flex; gap:8px; width:100%; max-width:360px;}
  button.primary{background:var(--tile-sel); border-color:var(--tile-sel); font-weight:600;}
  main{display:flex; gap:28px; flex-wrap:wrap; align-items:flex-start; justify-content:center;}
  /* ---- board column ---- */
  #boardCol{display:flex; flex-direction:column; align-items:center; gap:10px; min-width:320px;}
  #currentWord{height:34px; font-size:24px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--accent);}
  #feedback{height:22px; font-size:15px; color:var(--dim); transition:opacity .2s;}
  #feedback.good{color:var(--good);} #feedback.bonus{color:var(--bonus);} #feedback.bad{color:var(--bad);}
  #gridWrap{position:relative; touch-action:none;}
  #grid{display:grid; gap:8px;}
  .tile{width:var(--ts); height:var(--ts); background:var(--tile); border:2px solid var(--tile-edge);
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--ts)*.48); font-weight:700; text-transform:uppercase; user-select:none;
    cursor:pointer; transition:background .08s,transform .08s;}
  .tile.sel{background:var(--tile-sel); border-color:var(--accent); transform:scale(1.06);}
  .tile.hint{background:var(--tile-path); border-color:var(--accent);}
  #genOverlay{position:absolute; inset:0; background:rgba(28,9,12,.88); border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    font-size:15px; color:var(--dim); z-index:5;}
  #genOverlay .big{font-size:18px; color:var(--text); font-weight:600;}
  svg#lines{position:absolute; inset:0; pointer-events:none; z-index:2;}
  #boardStats{font-size:13px; color:var(--dim); text-align:center; line-height:1.5;}
  .kbdhint{font-size:12px; color:var(--dim); text-align:center; max-width:340px;}
  /* ---- words column ---- */
  #wordsCol{flex:1; min-width:300px; max-width:420px; background:var(--panel); border-radius:14px; padding:16px 18px;}
  #progressBarWrap{background:var(--panel2); border-radius:8px; height:14px; overflow:hidden; margin:8px 0 4px;}
  #progressBar{height:100%; width:0%; background:linear-gradient(90deg,var(--tile-sel),var(--accent)); transition:width .3s;}
  #scoreBarWrap{background:var(--panel2); border-radius:8px; height:8px; overflow:hidden; margin:0 0 4px;}
  #scoreBar{height:100%; width:0%; background:linear-gradient(90deg,#8a5a10,var(--bonus)); transition:width .3s;}
  #progressText{font-size:14px; color:var(--dim); margin-bottom:10px;}
  details{margin:6px 0; background:var(--panel2); border-radius:8px; padding:6px 10px;}
  summary{cursor:pointer; font-size:14px; font-weight:600; padding:4px 0;}
  summary .cnt{color:var(--dim); font-weight:400;}
  summary .done{color:var(--good);}
  .wordChips{display:flex; flex-wrap:wrap; gap:6px; padding:8px 0 4px;}
  .chip{background:var(--tile); border-radius:6px; padding:3px 8px; font-size:13px; letter-spacing:.5px;}
  .chip.revealed{color:var(--bad); opacity:.85;}
  .chip.blank{color:var(--dim); letter-spacing:2px;}
  #bonusSection{margin-top:14px; border-top:1px solid var(--panel2); padding-top:10px;}
  #bonusSection h3{font-size:14px; margin:0 0 6px; color:var(--bonus);}
  #revealBtn{margin-top:14px; width:100%;}
  #savesSection{margin-top:16px; border-top:1px solid var(--panel2); padding-top:10px;}
  #savesSection h3{font-size:14px; margin:0 0 8px; color:var(--dim); font-weight:600;}
  #savesHead{display:flex; align-items:center; justify-content:space-between;}
  #cleanupBtn{font-size:12px; padding:4px 10px; display:none;}
  .saveRow.stale{opacity:.45;}
  .saveRow.stale:hover{border-color:transparent;}
  .saveRow.stale .del{pointer-events:auto;}
  .vbadge{font-size:11px; color:var(--dim); border:1px solid var(--tile-edge); border-radius:4px; padding:0 4px; margin-left:6px;}
  .saveRow{display:flex; align-items:center; gap:10px; background:var(--panel2); border:1px solid transparent;
    border-radius:8px; padding:8px 10px; margin:6px 0; cursor:pointer; font-size:13px;}
  .saveRow:hover{border-color:var(--accent);}
  .saveRow.current{border-color:var(--tile-edge);}
  .saveRow .sname{font-weight:600;}
  .saveRow .smeta{color:var(--dim); font-size:12px;}
  .saveRow .sleft{flex:1; min-width:0;}
  .saveRow .sprog{color:var(--accent); white-space:nowrap;}
  .saveRow .sdone{color:var(--good);}
  .saveRow .del{background:none; border:none; color:var(--dim); font-size:15px; padding:2px 6px; cursor:pointer;}
  .saveRow .del:hover{color:var(--bad);}
  #savesEmpty{color:var(--dim); font-size:13px;}
  #winBanner{display:none; margin-top:12px; padding:12px; border-radius:10px; text-align:center;
    background:linear-gradient(90deg,#7a4e0e,#a9741a); font-weight:700; font-size:16px;}
  @media (max-width:720px){ #wordsCol{max-width:none;} }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>COPIA <span class="inf">∞</span></h1>
    <div class="spacer"></div>
    <label style="font-size:14px;color:var(--dim)">Size
      <select id="sizeSel">
        <option value="3">3 × 3</option>
        <option value="4" selected>4 × 4</option>
        <option value="5">5 × 5</option>
      </select>
    </label>
    <button id="newBtn" class="primary">New board</button>
  </header>
  <main>
    <div id="boardCol">
      <div id="currentWord"></div>
      <div id="feedback"></div>
      <div id="gridWrap">
        <svg id="lines"></svg>
        <div id="grid"></div>
        <div id="genOverlay">
          <div class="big">Generating board…</div>
          <div id="genInfo"></div>
        </div>
      </div>
      <div id="boardStats"></div>
      <div id="loadRow">
        <input type="text" id="boardName" placeholder="e.g. curious elephant" autocomplete="off">
        <button id="loadBtn">Load board</button>
      </div>
      <div class="kbdhint">Drag across tiles or just type a word and press Enter. Backspace deletes, Esc clears.</div>
    </div>
    <div id="wordsCol">
      <div style="font-weight:700;font-size:16px;">Words to find</div>
      <div id="progressBarWrap"><div id="progressBar"></div></div>
      <div id="scoreBarWrap"><div id="scoreBar"></div></div>
      <div id="progressText"></div>
      <div id="wordGroups"></div>
      <div id="bonusSection">
        <h3>Bonus words: <span id="bonusCount">0</span></h3>
        <div class="wordChips" id="bonusChips"></div>
      </div>
      <button id="revealBtn">Reveal remaining words</button>
      <div id="winBanner">🎉 You found every word!</div>
      <div id="savesSection">
        <div id="savesHead">
          <h3>Previous games</h3>
          <button id="cleanupBtn" title="Delete saves from older generator versions">Clear old versions</button>
        </div>
        <div id="savesList"></div>
      </div>
    </div>
  </main>
</div>

<script src="engine.js"></script>
<script>
"use strict";
/* The engine (scoring config, dictionary parser, trie solver, board
   generator, GEN_VERSION) lives in engine.js, shared with tools/. This block
   is only the game state & UI. The dictionary artifact stays embedded in the
   dict-data block above (see build/build_dict.py). */
const {GEN_VERSION, normalizeName, randomName, findPath} = CopiaEngine;
const {wordScore, stemMult, generateBoard} =
  CopiaEngine.createEngine(document.getElementById('dict-data').textContent);

/* ================= game state & UI ================= */
const els = id=>document.getElementById(id);
const grid=els('grid'), gridWrap=els('gridWrap'), overlay=els('genOverlay'),
      genInfo=els('genInfo'), curWordEl=els('currentWord'), feedbackEl=els('feedback'),
      linesSvg=els('lines');

const G = {
  n:4, name:'', board:[], nbr:null,
  required:new Set(), bonus:new Set(),
  foundReq:new Set(), foundBonus:new Set(),
  scores:new Map(), totalScore:0, maxScore:1,
  sel:[], typing:'', revealed:false, ready:false,
};

/* Display scores reuse the single scoring implementation (wordScore/stemMult
   above) against this board's find list. */
function displayScore(w){
  return wordScore(w) * stemMult(w, G.required);
}
function computeScores(){
  G.scores=new Map();
  let tot=0, mx=0;
  for(const w of G.required){ const s=displayScore(w); G.scores.set(w,s); tot+=s; if(s>mx)mx=s; }
  for(const w of G.bonus) G.scores.set(w, displayScore(w));
  G.totalScore=tot; G.maxScore=mx||1;
}
function scoreColor(t){
  t=Math.max(0,Math.min(1,Math.sqrt(t)));
  return `hsl(${Math.round((348+55*t)%360)} ${Math.round(15+75*t)}% ${Math.round(65-3*t)}%)`;
}

function tileSize(n){ return Math.min(84, Math.floor((Math.min(window.innerWidth-48,420))/n)-8); }

function renderGrid(){
  const ts = tileSize(G.n);
  grid.style.setProperty('--ts', ts+'px');
  grid.style.gridTemplateColumns = `repeat(${G.n},${ts}px)`;
  grid.innerHTML='';
  G.board.forEach((ch,i)=>{
    const d=document.createElement('div');
    d.className='tile'; d.dataset.i=i; d.textContent=ch;
    grid.appendChild(d);
  });
  requestAnimationFrame(()=>{
    linesSvg.setAttribute('width',gridWrap.clientWidth);
    linesSvg.setAttribute('height',gridWrap.clientHeight);
  });
}

function setFeedback(msg, cls){
  feedbackEl.textContent = msg||'';
  feedbackEl.className = cls||'';
  if(msg){ clearTimeout(setFeedback._t); setFeedback._t=setTimeout(()=>{feedbackEl.textContent='';},1800); }
}

function tileCenter(i){
  const t = grid.children[i].getBoundingClientRect();
  const w = gridWrap.getBoundingClientRect();
  return [t.left-w.left+t.width/2, t.top-w.top+t.height/2];
}
function drawPath(indices){
  let html='';
  for(let k=1;k<indices.length;k++){
    const [x1,y1]=tileCenter(indices[k-1]), [x2,y2]=tileCenter(indices[k]);
    html+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,138,146,.55)" stroke-width="6" stroke-linecap="round"/>`;
  }
  linesSvg.innerHTML=html;
}
function highlight(indices, cls='sel'){
  [...grid.children].forEach(t=>t.classList.remove('sel','hint'));
  indices.forEach(i=>grid.children[i].classList.add(cls));
  drawPath(indices);
}
function clearSelection(){
  G.sel=[]; G.typing='';
  highlight([]); linesSvg.innerHTML='';
  curWordEl.textContent='';
}

/* ---- word submission ---- */
function submitWord(word, viaPath){
  if(word.length<4){ if(word.length) setFeedback('Too short — 4+ letters','bad'); clearSelection(); return; }
  const onBoard = viaPath || !!findPath(G.board,G.nbr,word);
  if(!onBoard){ setFeedback("Can't trace that on this board",'bad'); clearSelection(); return; }
  if(G.foundReq.has(word)||G.foundBonus.has(word)){ setFeedback('Already found','bad'); clearSelection(); return; }
  if(G.required.has(word)){
    G.foundReq.add(word);
    setFeedback('✓ '+word.toUpperCase()+'  +'+G.scores.get(word).toFixed(1),'good');
  }else if(G.bonus.has(word)){
    G.foundBonus.add(word);
    setFeedback('★ Bonus: '+word.toUpperCase()+'  +'+G.scores.get(word).toFixed(1),'bonus');
  }else{
    setFeedback('Not in word list','bad');
  }
  clearSelection(); renderWords(); saveProgress();
}

/* ---- pointer input ---- */
let dragging=false;
function tileFromPoint(x,y){
  const el=document.elementFromPoint(x,y);
  if(el&&el.classList.contains('tile')){
    // require being reasonably inside the tile to ease diagonal drags
    const r=el.getBoundingClientRect();
    const dx=(x-r.left-r.width/2)/r.width, dy=(y-r.top-r.height/2)/r.height;
    if(dx*dx+dy*dy<=0.16) return +el.dataset.i;
  }
  return -1;
}
gridWrap.addEventListener('pointerdown',e=>{
  if(!G.ready) return;
  const i=tileFromPoint(e.clientX,e.clientY);
  if(i<0)return;
  dragging=true; G.typing='';
  G.sel=[i];
  highlight(G.sel); curWordEl.textContent=G.board[i];
  gridWrap.setPointerCapture(e.pointerId);
});
gridWrap.addEventListener('pointermove',e=>{
  if(!dragging)return;
  const i=tileFromPoint(e.clientX,e.clientY);
  if(i<0)return;
  const last=G.sel[G.sel.length-1];
  if(i===last)return;
  // backtrack
  if(G.sel.length>1 && i===G.sel[G.sel.length-2]){ G.sel.pop(); }
  else if(!G.sel.includes(i) && G.nbr[last].includes(i)){ G.sel.push(i); }
  else return;
  highlight(G.sel);
  curWordEl.textContent=G.sel.map(j=>G.board[j]).join('');
});
window.addEventListener('pointerup',()=>{
  if(!dragging)return;
  dragging=false;
  submitWord(G.sel.map(j=>G.board[j]).join(''), true);
});

/* ---- keyboard input ---- */
window.addEventListener('keydown',e=>{
  if(!G.ready||e.metaKey||e.ctrlKey||e.altKey)return;
  if(e.key==='Enter'){ submitWord(G.typing,false); return; }
  if(e.key==='Escape'){ clearSelection(); return; }
  if(e.key==='Backspace'){ G.typing=G.typing.slice(0,-1); }
  else if(/^[a-zA-Z]$/.test(e.key)){ G.typing+=e.key.toLowerCase(); }
  else return;
  G.sel=[];
  curWordEl.textContent=G.typing;
  const p = G.typing ? findPath(G.board,G.nbr,G.typing) : null;
  if(p) highlight(p,'hint'); else { highlight([]); linesSvg.innerHTML=''; }
});

/* ---- word list panel ---- */
function renderWords(){
  const byLen = new Map();
  for(const w of G.required){
    if(!byLen.has(w.length)) byLen.set(w.length,{all:[],found:0});
    byLen.get(w.length).all.push(w);
  }
  const lens=[...byLen.keys()].sort((a,b)=>a-b);
  let html='';
  for(const L of lens){
    const g=byLen.get(L);
    g.all.sort();
    const foundHere=g.all.filter(w=>G.foundReq.has(w));
    const open = L<=5 ? ' open' : '';
    html+=`<details${open}><summary>${L} letters <span class="cnt ${foundHere.length===g.all.length?'done':''}">${foundHere.length} / ${g.all.length}</span></summary><div class="wordChips">`;
    for(const w of g.all){
      if(G.foundReq.has(w)) html+=`<span class="chip" style="color:${scoreColor(G.scores.get(w)/G.maxScore)}" title="+${G.scores.get(w).toFixed(1)}">${w}</span>`;
      else if(G.revealed) html+=`<span class="chip revealed" title="+${G.scores.get(w).toFixed(1)}">${w}</span>`;
      else html+=`<span class="chip blank">${'•'.repeat(w.length)}</span>`;
    }
    html+='</div></details>';
  }
  els('wordGroups').innerHTML=html;
  const total=G.required.size, found=G.foundReq.size;
  let fs=0; for(const w of G.foundReq) fs+=G.scores.get(w)||0;
  els('progressBar').style.width=(total?100*found/total:0)+'%';
  els('scoreBar').style.width=(G.totalScore?100*fs/G.totalScore:0)+'%';
  els('progressText').textContent=`${found} of ${total} words · ${Math.round(fs)} of ${Math.round(G.totalScore)} pts`;
  els('bonusCount').textContent=G.foundBonus.size;
  els('bonusChips').innerHTML=[...G.foundBonus].sort().map(w=>`<span class="chip" style="color:${scoreColor((G.scores.get(w)||0)/G.maxScore)}" title="+${(G.scores.get(w)||0).toFixed(1)}">${w}</span>`).join('');
  els('winBanner').style.display = (total&&found===total)?'block':'none';
}

/* ---- persistence ---- */
const SAVES_KEY='copia:saves';
function loadSaves(){
  try{ return JSON.parse(localStorage.getItem(SAVES_KEY))||{}; }catch(e){ return {}; }
}
function saveProgress(){
  if(!G.ready) return;
  if(G.foundReq.size===0 && G.foundBonus.size===0 && !G.revealed) return;
  const all=loadSaves();
  all[G.n+'/'+G.name]={n:G.n, name:G.name, v:GEN_VERSION, ts:Date.now(), total:G.required.size,
    found:[...G.foundReq], bonus:[...G.foundBonus], revealed:G.revealed};
  try{ localStorage.setItem(SAVES_KEY, JSON.stringify(all)); }catch(e){}
  renderSaves();
}
function restoreProgress(){
  const s=loadSaves()[G.n+'/'+G.name];
  if(!s || s.v!==GEN_VERSION) return;
  for(const w of s.found||[]) if(G.required.has(w)) G.foundReq.add(w);
  for(const w of s.bonus||[]) if(G.bonus.has(w)) G.foundBonus.add(w);
  G.revealed=!!s.revealed;
}
function renderSaves(){
  const all=Object.entries(loadSaves()).sort((a,b)=>b[1].ts-a[1].ts);
  const curKey=G.n+'/'+G.name;
  if(!all.length){ els('savesList').innerHTML='<div id="savesEmpty">None yet — words you find are saved automatically.</div>'; return; }
  let html='', anyStale=false;
  for(const [key,s] of all){
    const stale=s.v!==GEN_VERSION;
    if(stale) anyStale=true;
    const done=s.total && s.found.length===s.total;
    const pct=s.total?Math.round(100*s.found.length/s.total):0;
    const d=new Date(s.ts).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
    html+=`<div class="saveRow${key===curKey?' current':''}${stale?' stale':''}" data-key="${key}">
      <div class="sleft"><div class="sname">${s.name}${stale?`<span class="vbadge" title="Played on an older board generator — this board can no longer be regenerated">v${s.v||0}</span>`:''}</div>
      <div class="smeta">${s.n}×${s.n} · ${d}</div></div>
      <div class="sprog${done?' sdone':''}">${done?'✓ solved':s.found.length+'/'+s.total+' · '+pct+'%'}</div>
      <button class="del" title="Delete saved game">✕</button></div>`;
  }
  els('savesList').innerHTML=html;
  els('cleanupBtn').style.display=anyStale?'inline-block':'none';
}
els('cleanupBtn').addEventListener('click',()=>{
  const all=loadSaves(), keep={};
  for(const [k,s] of Object.entries(all)) if(s.v===GEN_VERSION) keep[k]=s;
  try{ localStorage.setItem(SAVES_KEY, JSON.stringify(keep)); }catch(e){}
  renderSaves();
});
els('savesList').addEventListener('click',e=>{
  const row=e.target.closest('.saveRow');
  if(!row) return;
  const key=row.dataset.key;
  if(e.target.classList.contains('del')){
    const all=loadSaves(); delete all[key];
    try{ localStorage.setItem(SAVES_KEY, JSON.stringify(all)); }catch(ex){}
    renderSaves(); return;
  }
  if(row.classList.contains('stale')) return;
  const s=loadSaves()[key];
  if(!s || (s.n===G.n && s.name===G.name)) return;
  els('sizeSel').value=s.n;
  newGame(s.name);
});

/* ---- new game ---- */
function newGame(name){
  G.n=+els('sizeSel').value;
  G.name=normalizeName(name||randomName());
  location.hash=G.n+'/'+encodeURIComponent(G.name.replace(/ /g,'-'));
  G.ready=false; G.revealed=false;
  G.foundReq.clear(); G.foundBonus.clear();
  clearSelection();
  G.board=Array(G.n*G.n).fill('·');
  renderGrid();
  overlay.style.display='flex';
  genInfo.textContent='';
  document.querySelector('#genOverlay .big').textContent=`Generating “${G.name}”…`;
  generateBoard(G.n, G.name,
    (words,score,iter,total)=>{ genInfo.textContent=`${words} words · ${Math.round(100*iter/total)}%`; },
    (board,found,nbr)=>{
      G.board=board; G.nbr=nbr;
      G.required=found.common; G.bonus=found.bonus;
      computeScores();
      overlay.style.display='none';
      G.ready=true;
      restoreProgress();
      renderGrid();
      els('boardStats').innerHTML=`<b>“${G.name}”</b> · ${found.common.size} words to find · ${found.bonus.size} hidden bonus words`;
      renderWords();
      renderSaves();
    });
}
function parseHash(){
  const m=location.hash.match(/^#([345])\/(.+)$/);
  if(!m) return null;
  return {n:+m[1], name:normalizeName(decodeURIComponent(m[2]))};
}
els('newBtn').addEventListener('click',()=>newGame());
els('sizeSel').addEventListener('change',()=>newGame(G.name));
els('loadBtn').addEventListener('click',()=>{
  const v=els('boardName').value;
  if(v.trim()){ els('boardName').value=''; els('boardName').blur(); newGame(v); }
});
els('boardName').addEventListener('keydown',e=>{ e.stopPropagation(); if(e.key==='Enter') els('loadBtn').click(); });
els('revealBtn').addEventListener('click',()=>{
  if(G.revealed)return;
  if(confirm('Reveal all remaining words? This ends the challenge for this board.')){
    G.revealed=true; renderWords(); saveProgress();
  }
});
window.addEventListener('resize',()=>{ if(G.ready){renderGrid(); if(G.sel.length)highlight(G.sel);} });

const startup=parseHash();
if(startup){ els('sizeSel').value=startup.n; newGame(startup.name); }
else newGame();
</script>
